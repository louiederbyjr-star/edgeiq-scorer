# railway.toml — deploys score_picks.py as a daily cron on Railway.app
# Free tier: 500 hours/month (plenty for a once-daily script)
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python score_picks.py"
cronSchedule = "0 12,19 * * *"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
