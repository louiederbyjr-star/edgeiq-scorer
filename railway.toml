# railway.toml — EdgeIQ Scorer
# Three runs per day (all times UTC, ET = UTC-4):
#   12:00 UTC = 8 AM ET  → morning run (today's upcoming games)
#   19:00 UTC = 3 PM ET  → afternoon run (today's remaining, replaces in-progress)
#   00:00 UTC = 8 PM ET  → evening run (tomorrow's full slate)

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python score_picks.py"
cronSchedule = "0 12,19,0 * * *"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
